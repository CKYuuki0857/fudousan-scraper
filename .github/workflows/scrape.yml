name: 抓實價登錄
on:
  workflow_dispatch:
    inputs:
      url:
        description: '5168 社區網址'
        required: true
jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - run: python scraper.py "${{ github.event.inputs.url }}"
      - name: 存回 repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f records.json
          git commit -m "更新成交資料" || echo "無變動"
          git push
